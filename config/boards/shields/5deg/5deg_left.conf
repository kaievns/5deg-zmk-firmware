# Left half: central role, USB to PC

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
CONFIG_ZMK_USB=y

# Battery reporting (both halves via central)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Larger split input queue: default 5 is shared between key and pointer
# events and drops silently on overflow (K_NO_WAIT). Trackball bursts can
# fill this during a brief BLE stall and lose events.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=20
