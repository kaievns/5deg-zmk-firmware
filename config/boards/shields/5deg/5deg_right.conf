# Right half: peripheral role, trackball

# PMW3610 trackball sensor
CONFIG_INPUT=y
CONFIG_PMW3610=y
# One report per typical BLE connection interval (pref 7.5–15ms).
# 8ms lets the sensor outrun the link during stalls and stack up bursts
# in the ACL TX buffer — 12ms caps the peripheral-side rate instead.
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12
